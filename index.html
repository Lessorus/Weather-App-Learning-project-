<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Weather App — погода онлайн</title>
  <meta name="description" content="Простое приложение для проверки погоды в любом городе мира">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<template id="error-icon-tmpl">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-emoji-smile-upside-down" viewBox="0 0 16 16" style="vertical-align: middle; margin-left: 4px;">
    <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1m0-1a8 8 0 1 1 0 16A8 8 0 0 1 8 0"/>
    <path d="M4.285 6.433a.5.5 0 0 0 .683-.183A3.5 3.5 0 0 1 8 4.5c1.295 0 2.426.703 3.032 1.75a.5.5 0 0 0 .866-.5A4.5 4.5 0 0 0 8 3.5a4.5 4.5 0 0 0-3.898 2.25.5.5 0 0 0 .183.683M7 9.5C7 8.672 6.552 8 6 8s-1 .672-1 1.5.448 1.5 1 1.5 1-.672 1-1.5m4 0c0-.828-.448-1.5-1-1.5s-1 .672-1 1.5.448 1.5 1 1.5 1-.672 1-1.5"/>
  </svg>
</template>


  <main>
    <section class="top-banner">
      <div class="container">
        <h1 class="heading">Simple Weather App</h1>
        <p class="subheading">Узнай погоду в любой точке мира за секунду</p>
        <form id="weather-form" aria-label="Поиск погоды по городу">
          <label for="city-input" class="visually-hidden">Название города</label>
          <input type="text" id="city-input" name="city" placeholder="Найди свой город" autofocus required>
          <button type="submit">SUBMIT</button>
          <span class="msg" role="status" aria-live="polite"></span>
        </form>
      </div>
    </section>

    <section class="ajax-section" aria-label="Результаты поиска погоды">
      <div class="container">
        <ul class="cities"></ul>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <div class="container">
      <small>Сделано с <span>❤</span> для практики ПМ.02 — Хекслет колледж</small>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
